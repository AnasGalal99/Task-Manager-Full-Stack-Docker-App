events {
    worker_connections 1024;
}

http {
    include mime.types;

    # Upstream load balancer
    upstream task_backend {
        least_conn;
        server flask1:8000;
        server flask2:8000;
    }

    # limit_req_zone OUTSIDE server blocks
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    # HTTP server
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/ssl/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/private/selfsigned.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            limit_req zone=mylimit burst=20 nodelay;
            proxy_pass http://task_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Nginx serves CSS directly
        location /static/ {
            alias /app/static/;
        }
    }
}